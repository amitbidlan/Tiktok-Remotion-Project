name: Render MojiIQ Lesson Video
on:
  workflow_dispatch:
    inputs:
      lesson_title:
        description: 'Lesson title (used for artifact name)'
        required: false
        default: 'lesson'
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Install Remotion Chrome dependencies
        run: |
          npx remotion browser ensure
      - name: Fetch Pexels background videos
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/fetch-videos.js
      - name: Generate ElevenLabs audio
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/generate-audio.js
      - name: Render video with Remotion
        run: |
          npx remotion render MojiiqLesson out/mojiiq-lesson.mp4 \
            --codec=h264 \
            --pixel-format=yuv420p \
            --crf=18 \
            --log=verbose
      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojiiq-video-${{ github.event.inputs.lesson_title || 'lesson' }}-${{ github.run_number }}
          path: out/mojiiq-lesson.mp4
          retention-days: 90
          if-no-files-found: error
